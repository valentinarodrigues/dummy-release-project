name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * *" # runs daily at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. If this is still relevant, please leave a comment.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.

          # Pull requests
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been inactive for 14 days. It will be closed in 7 days
            unless there is new activity. Please rebase or update if you intend to merge.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if you'd like to continue.

          # Never mark these as stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
