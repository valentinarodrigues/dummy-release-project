name: Deploy to Production

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        description: Tag of the draft release to publish after a successful deploy
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploy
        run: npm test

      - name: Deploy to production
        run: |
          echo "Deploying ${{ inputs.tag_name || 'latest' }} to production..."
          # Replace with your actual deploy command, e.g.:
          # npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          # aws s3 sync dist/ s3://my-prod-bucket
          echo "Production deploy complete."

      # Only runs if triggered by Release Please with a tag.
      # Publishes the draft release now that production is confirmed live.
      - name: Publish GitHub Release
        if: ${{ inputs.tag_name != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
          echo "Release ${{ inputs.tag_name }} is now public."
