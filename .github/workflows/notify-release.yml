name: Notify on Release

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        description: Tag name of the release that was just published
        required: false
        type: string

jobs:
  notify:
    name: Send release notifications
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        # Requires SLACK_WEBHOOK_URL secret to be set in repo settings
        if: ${{ vars.NOTIFY_SLACK == 'true' }}
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": ":rocket: *${{ inputs.tag_name || github.event.release.tag_name }}* has been released!\nhttps://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag_name || github.event.release.tag_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create release summary
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          echo "## Release ${TAG} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repo:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://github.com/${{ github.repository }}/releases/tag/${TAG}" >> $GITHUB_STEP_SUMMARY
