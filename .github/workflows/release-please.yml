name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Don't publish the GitHub Release yet — it is created at the end
          # of the production deploy so the release only exists once the code
          # is actually live.
          skip-github-release: true

  # Deploy to production first, then create the release as the final step.
  deploy-prod:
    name: Deploy to Production
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/deploy-prod.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}

  # Notify only after the deploy (and therefore the release) is complete.
  notify:
    name: Notify on Release
    needs: [release-please, deploy-prod]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/notify-release.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
