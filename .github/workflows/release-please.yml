name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Release Please creates a DRAFT release + git tag.
          # The release is published only after a successful production deploy.

  # Deploy to production first, then publish the draft release as the final step.
  deploy-prod:
    name: Deploy to Production
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/deploy-prod.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}

  # Notify only after deploy (and therefore the published release) is complete.
  notify:
    name: Notify on Release
    needs: [release-please, deploy-prod]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/notify-release.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
